<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIコーチング</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel (ブラウザ内でJSXを動かすため) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .custom-scrollbar::-webkit-scrollbar {
      width: 0px;
      background: transparent;
    }
    /* モーダル用のフェードインアニメーション */
    @keyframes fadeInScale {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    .animate-fade-in-scale {
      animation: fadeInScale 0.2s ease-out forwards;
    }
  </style>
</head>
<body class="bg-gray-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- アイコンコンポーネント ---
    const ChevronLeft = ({ size = 24, strokeWidth = 2, className = "" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="15 18 9 12 15 6"></polyline></svg>);
    const Mic = ({ size = 24, strokeWidth = 2, className = "" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg>);
    const Bot = ({ size = 24, strokeWidth = 2, className = "" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="11" width="18" height="10" rx="2"></rect><circle cx="12" cy="5" r="2"></circle><path d="M12 7v4"></path><line x1="8" y1="16" x2="8" y2="16"></line><line x1="16" y1="16" x2="16" y2="16"></line></svg>);
    const ArrowUp = ({ size = 24, strokeWidth = 2, className = "" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>);
    const X = ({ size = 24, strokeWidth = 2, className = "" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>);

    // --- ランダムな日時候補を生成する関数 ---
    const generateRandomDates = () => {
      const dates = [];
      const now = new Date();
      
      const offsets = [1, 2, 3].map(val => val + Math.floor(Math.random() * 2));
      
      offsets.forEach(offset => {
        const d = new Date(now);
        d.setDate(now.getDate() + offset);
        d.setHours(Math.floor(Math.random() * 8) + 10); 
        const month = d.getMonth() + 1;
        const date = d.getDate();
        const day = ['日', '月', '火', '水', '木', '金', '土'][d.getDay()];
        const hours = d.getHours();
        dates.push(`${month}月${date}日(${day}) ${hours}:00`);
      });
      return dates;
    };

    // --- 初期モックデータ ---
    const initialMessages = [
      {
        id: 1,
        sender: 'user',
        text: '約束していた家事の分担で、自分が疲れて後回しにしていたところに、花子から言われて強く言い返してしまいました。\n反省して謝りたいのですが、気まずくてどうしたら良いかわからないです。',
        time: '16:18',
        avatar: 'https://i.pravatar.cc/150?img=11' 
      },
      {
        id: 2,
        sender: 'ai',
        text: 'なるほど、それは大変ですね。でも、仲良くする気持ちがあれば、解決は早いと思います。\nまずは、家事分担でどのようなことがこれまで話し合ったのか振り返りつつ、謝り方について考えましょう。',
        time: '16:19'
      },
      {
        id: 3,
        sender: 'ai',
        type: 'agreement_card',
        title: '家事に関する話し合ったこと',
        content: '少し、花子さんが家事を行うものの太郎さんも多くの家事を行う話でした。\n太郎さんは後でやろうと思っていたとのことですが、疲れている中ではありますが、「いつやるのか」を明確に伝えていれば問題は起きなかったかもしれません。',
        details: '【話し合いの経緯】\n太郎さんの帰宅が遅い日が続き、家事分担について話し合いました。\n\n【決まったルール】\n・平日のメインは花子さんが担当する\n・太郎さんは自分のタイミング（後でやる等）がある場合は、「いつやるか」を必ず明確に伝える\n・休日は太郎さんがまとめて掃除を担当する\n\n【相手への想い】\n太郎「疲れているとつい後回しにしてごめん。今後は言葉にして伝えるよ。」\n花子「やってくれる気持ちは嬉しいから、見通しが立つと安心します。」',
        time: '16:19',
        users: [
          'https://i.pravatar.cc/150?img=11', 
          'https://i.pravatar.cc/150?img=5'  
        ]
      },
      {
        id: 4,
        sender: 'ai',
        text: '次は謝り方について考えますか？\nそれともアドバイザーと面談をしますか？',
        time: '16:19',
        actions: [
          { label: '謝り方を考える', action: 'apologize' },
          { label: 'アドバイザーと面談', action: 'advisor' }
        ]
      }
    ];

    function App() {
      const [messages, setMessages] = useState(initialMessages);
      const [inputText, setInputText] = useState('');
      const [isTyping, setIsTyping] = useState(false);
      const [selectedAgreement, setSelectedAgreement] = useState(null); // モーダル用の状態
      const messagesEndRef = useRef(null);

      const scrollToBottom = () => {
        messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
      };

      useEffect(() => {
        scrollToBottom();
      }, [messages, isTyping]);

      // Gemini API呼び出し処理
      const generateAiResponse = async (userText, currentMessages) => {
        
        // ★★★ 裏技：キーを分割して自動スキャンを回避する ★★★
        const part1 = "AIzaSy"; 
        const part2 = "DdSuW_iLJP_wrXxc8sKha_9ZeTRxgE-yg"; // ←★ここに新しいキーの後半部分を入れてください
        
        const apiKey = part1 + part2;
        
        if (!part2 || part2.includes("ここに残り")) {
           return { text: "APIキーが設定されていません。コード内の part2 の部分に新しいキーの後半を入力してください。", agreement: null };
        }
        
        let targetModelName = "models/gemini-1.5-flash"; 
        
        try {
            const listUrl = `https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`;
            const listRes = await fetch(listUrl);
            if (listRes.ok) {
                const listData = await listRes.json();
                const availableModels = listData.models?.filter(m => m.supportedGenerationMethods?.includes("generateContent")) || [];
                const flashModel = availableModels.find(m => m.name.includes("flash"));
                if (flashModel) {
                    targetModelName = flashModel.name;
                } else if (availableModels.length > 0) {
                    targetModelName = availableModels[0].name;
                }
            }
        } catch(e) {
            console.warn("モデルの自動検索に失敗しました", e);
        }
        
        const url = `https://generativelanguage.googleapis.com/v1beta/${targetModelName}:generateContent?key=${apiKey}`;

        // APIの仕様に合わせて会話履歴を構築
        const contents = [];
        const textMessages = currentMessages.filter(m => m.text);
        
        textMessages.forEach(m => {
          const role = m.sender === 'user' ? 'user' : 'model';
          if (contents.length > 0 && contents[contents.length - 1].role === role) {
            contents[contents.length - 1].parts[0].text += "\n" + m.text;
          } else {
            contents.push({ role, parts: [{ text: m.text }] });
          }
        });

        if (contents.length > 0 && contents[0].role !== 'user') {
            contents.unshift({ role: 'user', parts: [{ text: 'こんにちは' }] });
        }

        // 新しいルールのまとめ作成機能を追加したプロンプト
        const systemPrompt = `あなたは結婚相談所オーネットが提供する「パートナーシップのための関係性AIコーチング」のチャットボットです。
ユーザー（太郎さん）は妻（花子さん）との関係やコミュニケーションについて悩みを相談してきます。
ユーザーの感情を受け止めて共感しつつ、関係修復やより良いコミュニケーションのためのアドバイスを行ってください。

【重要：新しいルールの作成機能】
ユーザーが「新たな相談のトピックを出した時」や「新しいルールを作りたい」という意図を示した場合は、まずはユーザーの希望や状況を優しくヒアリングしてください。
会話を通じて妥協点が見つかり、二人の新しいルールや合意事項としてまとめられる状態になったら、返答の一番最後に以下の形式でまとめデータを出力してください。
---まとめここから---
タイトル: [ルールの短いタイトル]
内容: [決まったルールの具体的な内容を簡潔に]
---まとめここまで---
（※まだヒアリング中の段階では、まとめデータは出力せず通常の返答のみを行ってください）`;

        if (contents.length > 0) {
            contents[0].parts[0].text = `【AIへの指示】\n${systemPrompt}\n\n【ユーザーからのメッセージ】\n${contents[0].parts[0].text}`;
        }

        const payload = { contents };

        try {
          const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          
          if (!response.ok) {
              const errData = await response.json();
              return { text: `【APIエラー発生】\n理由: ${errData.error?.message || response.statusText}`, agreement: null };
          }
          
          const data = await response.json();
          const responseText = data.candidates[0].content.parts[0].text;
          
          let cleanText = responseText;
          let newAgreement = null;
          
          // AIの返答から「まとめデータ」を抽出する正規表現
          const summaryRegex = /---まとめここから---[\s\S]*?タイトル:\s*(.*?)[\s\S]*?内容:\s*([\s\S]*?)---まとめここまで---/;
          const match = responseText.match(summaryRegex);
          
          if (match) {
            newAgreement = {
              title: match[1].trim(),
              content: match[2].trim(),
              details: `【新たに作成された合意事項】\n\nAIコーチングを通じて、以下のルールが新しく設定されました。\n\n${match[2].trim()}`
            };
            // 抽出したまとめ部分は通常のテキストからは削除する
            cleanText = responseText.replace(summaryRegex, '').trim();
          }

          return { text: cleanText, agreement: newAgreement };

        } catch (error) {
          return { text: `【通信エラー】ネットワーク接続を確認してください。\n詳細: ${error.message}`, agreement: null };
        }
      };

      const handleSendMessage = async (e) => {
        e.preventDefault();
        if (!inputText.trim() || isTyping) return;

        const newText = inputText;
        const newUserMsg = {
          id: Date.now(),
          sender: 'user',
          text: newText,
          time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
          avatar: 'https://i.pravatar.cc/150?img=11'
        };

        const updatedMessages = [...messages, newUserMsg];
        setMessages(updatedMessages);
        setInputText('');
        setIsTyping(true);

        const isRequestingAdvisor = newText.includes('面談') || newText.includes('相談') || newText.includes('アドバイザー');

        if (isRequestingAdvisor && !newText.includes('新たな')) {
          setTimeout(() => {
            const randomDates = generateRandomDates();
            const newAiMsg = {
              id: Date.now() + 1,
              sender: 'ai',
              text: '承知いたしました。これまでの対話履歴をアドバイザーに共有し、より深い視点からサポートさせていただきます。\nまずは面談の希望日時を以下の候補からお選びください。',
              time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
              avatar: 'bot',
              actions: randomDates.map(date => ({ label: date, action: 'schedule_advisor' }))
            };
            setMessages(prev => [...prev, newAiMsg]);
            setIsTyping(false);
          }, 1500);
          return;
        }

        const aiResponse = await generateAiResponse(newText, updatedMessages);

        if (aiResponse.text) {
          const newAiMsg = {
            id: Date.now() + 1,
            sender: 'ai',
            text: aiResponse.text,
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
            avatar: 'bot'
          };
          setMessages(prev => [...prev, newAiMsg]);
        }
        setIsTyping(false);

        // AIがまとめデータを出力していた場合、少し遅れてカードを表示する
        if (aiResponse.agreement) {
          setTimeout(() => {
            const cardMsg = {
              id: Date.now() + 2,
              sender: 'ai',
              type: 'agreement_card',
              title: aiResponse.agreement.title,
              content: aiResponse.agreement.content,
              details: aiResponse.agreement.details,
              time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
              users: [
                'https://i.pravatar.cc/150?img=11', 
                'https://i.pravatar.cc/150?img=5'  
              ]
            };
            setMessages(prev => [...prev, cardMsg]);
          }, 800);
        }
      };

      const handleActionClick = async (actionType, actionLabel) => {
        setIsTyping(true);
        let userActionText = '';
        if (actionType === 'apologize') {
          userActionText = '謝り方を考えたいです。';
        } else if (actionType === 'advisor') {
          userActionText = 'アドバイザーと面談したいです。';
        } else if (actionType === 'schedule_advisor') {
          userActionText = `${actionLabel}でお願いします。`;
        }

        const newUserMsg = {
          id: Date.now(),
          sender: 'user',
          text: userActionText,
          time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
          avatar: 'https://i.pravatar.cc/150?img=11'
        };
        
        const updatedMessages = [...messages, newUserMsg];
        setMessages(updatedMessages);

        if (actionType === 'advisor') {
          setTimeout(() => {
            const randomDates = generateRandomDates();
            const newAiMsg = {
              id: Date.now() + 1,
              sender: 'ai',
              text: '承知いたしました。これまでの対話履歴をアドバイザーに共有し、より深い視点からサポートさせていただきます。\nまずは面談の希望日時を以下の候補からお選びください。',
              time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
              avatar: 'bot',
              actions: randomDates.map(date => ({ label: date, action: 'schedule_advisor' }))
            };
            setMessages(prev => [...prev, newAiMsg]);
            setIsTyping(false);
          }, 1500);
          return;
        } else if (actionType === 'schedule_advisor') {
          setTimeout(() => {
            const newAiMsg = {
              id: Date.now() + 1,
              sender: 'ai',
              text: `ありがとうございます。${actionLabel}でアドバイザーとの面談予約を承りました。\n当日はお時間になりましたら、アプリ内のビデオ通話機能よりご参加ください。`,
              time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
              avatar: 'bot'
            };
            setMessages(prev => [...prev, newAiMsg]);
            setIsTyping(false);
          }, 1500);
          return;
        }

        const aiResponse = await generateAiResponse(userActionText, updatedMessages);
        
        if (aiResponse.text) {
          const newAiMsg = {
            id: Date.now() + 1,
            sender: 'ai',
            text: aiResponse.text,
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
            avatar: 'bot'
          };
          setMessages(prev => [...prev, newAiMsg]);
        }
        setIsTyping(false);

        if (aiResponse.agreement) {
          setTimeout(() => {
            const cardMsg = {
              id: Date.now() + 2,
              sender: 'ai',
              type: 'agreement_card',
              title: aiResponse.agreement.title,
              content: aiResponse.agreement.content,
              details: aiResponse.agreement.details,
              time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
              users: [
                'https://i.pravatar.cc/150?img=11', 
                'https://i.pravatar.cc/150?img=5'  
              ]
            };
            setMessages(prev => [...prev, cardMsg]);
          }, 800);
        }
      };

      return (
        <div className="min-h-screen bg-gray-100 flex items-center justify-center p-4 font-sans text-gray-800">
          <div className="w-full max-w-[400px] h-[800px] bg-[#f4f5f7] rounded-[40px] shadow-2xl overflow-hidden flex flex-col relative border-8 border-gray-900">
            
            <div className="h-7 w-full bg-[#f4f5f7] flex justify-between items-center px-6 pt-2 text-[10px] font-medium text-black z-20">
              <span>16:20</span>
              <div className="flex gap-1.5 items-center">
                <div className="w-4 h-3 bg-black rounded-sm relative overflow-hidden">
                   <div className="absolute left-0 bottom-0 w-3 h-2 bg-[#f4f5f7]"></div>
                </div>
                <div className="w-4 h-3 bg-black rounded-sm relative overflow-hidden flex items-end justify-center pb-[1px]">
                   <div className="w-3 h-1.5 bg-[#f4f5f7] rounded-sm"></div>
                </div>
                <div className="w-5 h-2.5 border border-black rounded-sm relative">
                   <div className="absolute left-[1px] top-[1px] bottom-[1px] w-[70%] bg-black"></div>
                   <div className="absolute right-[-3px] top-[2px] w-0.5 h-1 bg-black"></div>
                </div>
              </div>
            </div>

            <div className="absolute top-2 left-1/2 transform -translate-x-1/2 w-[120px] h-7 bg-black rounded-full z-20"></div>

            <header className="bg-[#f4f5f7] px-4 pt-6 pb-2 flex items-center justify-between z-10 relative">
              <button className="p-2 -ml-2 text-gray-600 hover:bg-gray-200 rounded-full transition-colors">
                <ChevronLeft size={28} strokeWidth={2.5} />
              </button>
              <h1 className="text-[17px] font-bold tracking-tight text-gray-900">AIコーチング</h1>
              <button className="p-2 -mr-2 text-gray-600 hover:bg-gray-200 rounded-full transition-colors">
                <Mic size={24} />
              </button>
            </header>

            <div className="flex-1 overflow-y-auto px-4 pt-4 pb-6 space-y-6 custom-scrollbar relative z-0">
              {messages.map((msg) => (
                <div key={msg.id} className={`flex flex-col w-full ${msg.sender === 'user' ? 'items-end' : 'items-start'}`}>
                  
                  {msg.sender === 'user' && (
                    <div className="flex items-end justify-end w-full gap-2">
                      <div className="max-w-[75%] bg-white rounded-[22px] rounded-br-sm p-4 text-[14px] leading-[1.6] shadow-sm border border-gray-100 text-gray-800 tracking-wide whitespace-pre-wrap">
                        {msg.text}
                      </div>
                      <img src={msg.avatar} alt="User" className="w-8 h-8 rounded-full object-cover shadow-sm mb-1" />
                    </div>
                  )}

                  {msg.sender === 'ai' && !msg.type && (
                    <div className="max-w-[85%] ml-[36px] relative">
                      <div className="bg-white rounded-[22px] rounded-tl-sm p-4 text-[14px] leading-[1.6] shadow-[0_2px_10px_rgba(0,0,0,0.03)] border border-gray-100 text-gray-800 tracking-wide whitespace-pre-wrap">
                        {msg.text}
                      </div>
                      <div className="absolute -bottom-2 -right-2 w-7 h-7 bg-white rounded-full shadow-sm border border-gray-100 flex items-center justify-center">
                        <Bot size={16} className="text-gray-400" />
                      </div>
                    </div>
                  )}

                  {msg.type === 'agreement_card' && (
                    <div className="w-[90%] mx-auto bg-white rounded-[24px] p-5 shadow-[0_4px_15px_rgba(0,0,0,0.04)] border border-gray-100 mt-2 mb-2 relative">
                      <h3 className="text-[15px] font-bold text-center text-gray-900 mb-5 tracking-tight">
                        {msg.title}
                      </h3>
                      
                      <div className="flex justify-center items-center gap-0 mb-5 relative">
                        <div className="absolute w-[60px] h-[2px] bg-orange-400 z-0"></div>
                        <img src={msg.users[0]} alt="taro" className="w-[38px] h-[38px] rounded-full border-2 border-white shadow-md z-10 relative -left-6 object-cover bg-white" />
                        <img src={msg.users[1]} alt="Hanako" className="w-[38px] h-[38px] rounded-full border-2 border-white shadow-md z-10 relative -right-6 object-cover bg-white" />
                      </div>
                      
                      <p className="text-[13px] text-gray-600 leading-[1.7] mb-5 tracking-wide whitespace-pre-wrap">
                        {msg.content}
                      </p>
                      
                      <div className="flex justify-center">
                        <button 
                          onClick={() => setSelectedAgreement(msg)}
                          className="text-[12px] font-medium text-gray-600 border border-gray-200 px-5 py-2 rounded-full hover:bg-gray-50 transition-colors shadow-sm"
                        >
                          詳しくみる {'>'}
                        </button>
                      </div>
                    </div>
                  )}

                  {msg.actions && (
                     <div className="flex flex-col gap-2 mt-3 w-[85%] ml-[36px]">
                       {msg.actions.map(action => (
                         <button 
                           key={action.label}
                           onClick={() => handleActionClick(action.action, action.label)}
                           className="w-full bg-white border border-gray-200 text-gray-700 text-[14px] font-medium py-3 px-4 rounded-[16px] shadow-sm hover:bg-gray-50 transition-colors text-center"
                         >
                           {action.label}
                         </button>
                       ))}
                     </div>
                  )}

                  <span className={`text-[10px] text-gray-400 mt-1 px-1 ${msg.sender === 'user' ? 'mr-10' : 'ml-[36px]'}`}>
                    {msg.time}
                  </span>
                </div>
              ))}

              {isTyping && (
                <div className="max-w-[85%] ml-[36px] relative">
                  <div className="bg-white rounded-[22px] rounded-tl-sm py-4 px-5 w-fit shadow-[0_2px_10px_rgba(0,0,0,0.03)] border border-gray-100 flex items-center gap-1.5">
                    <div className="w-2 h-2 bg-gray-300 rounded-full animate-bounce" style={{ animationDelay: '0ms' }}></div>
                    <div className="w-2 h-2 bg-gray-300 rounded-full animate-bounce" style={{ animationDelay: '150ms' }}></div>
                    <div className="w-2 h-2 bg-gray-300 rounded-full animate-bounce" style={{ animationDelay: '300ms' }}></div>
                  </div>
                  <div className="absolute -bottom-2 -right-2 w-7 h-7 bg-white rounded-full shadow-sm border border-gray-100 flex items-center justify-center">
                    <Bot size={16} className="text-gray-400" />
                  </div>
                </div>
              )}
              <div ref={messagesEndRef} className="h-4" />
            </div>

            <div className="bg-[#f4f5f7] px-4 py-3 pb-8 z-10 border-t border-gray-200/60">
              <form onSubmit={handleSendMessage} className="flex items-center gap-2 bg-white rounded-full pl-4 pr-1.5 py-1.5 shadow-sm border border-gray-200">
                <input
                  type="text"
                  value={inputText}
                  onChange={(e) => setInputText(e.target.value)}
                  placeholder="メッセージを入力"
                  className="flex-1 bg-transparent text-[15px] py-1.5 px-2 focus:outline-none text-gray-800"
                  disabled={isTyping}
                />
                <button 
                  type="submit" 
                  disabled={!inputText.trim() || isTyping}
                  className={`w-[34px] h-[34px] rounded-full flex items-center justify-center transition-colors ${
                    inputText.trim() && !isTyping ? 'bg-black text-white' : 'bg-gray-100 text-gray-400'
                  }`}
                >
                  <ArrowUp size={18} strokeWidth={2.5} />
                </button>
              </form>
            </div>
            
            <div className="absolute bottom-2 left-1/2 transform -translate-x-1/2 w-[130px] h-1.5 bg-black rounded-full z-20"></div>
            
            {/* --- モーダル (詳しくみる) --- */}
            {selectedAgreement && (
              <div className="absolute inset-0 bg-black/40 z-50 flex items-center justify-center p-5 backdrop-blur-sm">
                <div className="bg-white rounded-[28px] p-6 w-full shadow-2xl relative animate-fade-in-scale">
                  <button 
                    onClick={() => setSelectedAgreement(null)}
                    className="absolute top-4 right-4 text-gray-400 hover:text-gray-700 bg-gray-100 rounded-full p-1 transition-colors"
                  >
                    <X size={20} />
                  </button>
                  <h2 className="text-[17px] font-bold text-gray-900 mb-5 pb-3 border-b border-gray-100 pr-6">
                    {selectedAgreement.title}
                  </h2>
                  <div className="text-[14px] text-gray-700 whitespace-pre-wrap leading-[1.8] max-h-[400px] overflow-y-auto custom-scrollbar">
                    {selectedAgreement.details}
                  </div>
                  <div className="mt-6 pt-4 text-center">
                    <button 
                      onClick={() => setSelectedAgreement(null)}
                      className="bg-black text-white text-[14px] font-medium py-3 px-8 rounded-full shadow-md hover:bg-gray-800 transition-colors w-full"
                    >
                      閉じる
                    </button>
                  </div>
                </div>
              </div>
            )}
            
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
